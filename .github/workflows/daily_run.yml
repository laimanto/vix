name: VIX Strategy Daily Run

on:
  schedule:
    # 21:00 UTC = ~17:00 EDT (summer) / ~16:00 EST (winter)
    # yfinance EOD data is fully settled by this time.
    - cron: '35 20 * * 1-5'   # 4:35pm EDT (20:35 UTC), weekdays only (Mon–Fri)
  workflow_dispatch:           # allow manual trigger from GitHub UI

permissions:
  contents: write              # needed to push updated CSVs + index.html back

jobs:
  daily-run:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4.2.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run daily pipeline
        run: |
          cd scripts
          python run_daily.py
        env:
          PYTHONPATH: ${{ github.workspace }}/scripts

      - name: Commit updated data + dashboard
        run: |
          git config --global user.name  "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/daily_log.csv   \
                  data/option_price.csv \
                  data/position.json    \
                  data/trades.csv       \
                  dashboard/index.html
          git diff --staged --quiet && echo "Nothing changed" || \
            git commit -m "Daily update $(date -u +'%Y-%m-%d')"
          git pull --rebase -X ours origin main
          git push
